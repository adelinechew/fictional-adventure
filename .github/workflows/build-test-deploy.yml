name: build-test-deploy

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repo
        uses: action/checkout@v6
      - name: user node.js
        uses: actions/setup-node@v6
        with:
            node-version: '24.x'
      - run: npm install
      - run: npm run build
      
